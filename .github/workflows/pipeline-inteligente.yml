name: Pipeline Inteligente

on:
  # Regra 1: Gatilho manual
  workflow_dispatch:

  # Regra 2: Agendamento - todos os dias às 02:00 AM UTC
  schedule:
    - cron: "0 2 * * *"

  # Regras 3 e 4: Push com filtro de branch e caminho com exceção
  push:
    branches:
      - "feature/*"
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    name: O Produtor de Artefatos
    runs-on: ubuntu-latest
    steps:
      - name: Criando os relatórios
        run: |
          mkdir -p saida_build
          echo "Sucesso! Primeiro relatório gerado em $(date)" > saida_build/relatorio1.txt
          echo "Sucesso! Segundo relatório gerado em $(date)" > saida_build/relatorio2.txt

      - name: Fazendo o upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    name: O Consumidor de Artefatos
    runs-on: ubuntu-latest
    needs: job_gerador
    steps:
      - name: Fazendo o download de artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Conferindo se os arquivos chegaram
        run: |
          echo "Listando as pastas"
          ls -R
          echo "Comprovando a sobrevivência dos arquivos"
          cat relatorio1.txt
